<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Chat v2 - sugoroku</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    "Hiragino Kaku Gothic ProN",
    "Hiragino Sans",
    "Noto Sans JP",
    Meiryo,
    sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
}


#login, #chat { flex: 1; display: flex; flex-direction: column; }
#chat { display: none; }

.system { color: gray; }
.system.girl { color: red; font-weight: bold; }
.system.boy { color: blue; font-weight: bold; }

#controls { display: flex; gap: 5px; padding: 5px; position: sticky; top: 0; background: #fff; z-index: 10; }
input, button, select { padding: 10px; font-size: 16px; }

#punishWrap {
  gap: 20px;

  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;

  background: #fff;
  padding: 10px;
  z-index: 200;

  display: flex;
  justify-content: flex-start;
}


#userList {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  background: #f0f0f0;
  padding: 5px;
  list-style: none;
  align-items: center;
}

#userList li {
  padding: 3px 8px;
  border-radius: 5px;
  white-space: nowrap;
}


#settings { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; padding: 5px; background: #f9f9f9; border-bottom: 1px solid #ccc; }
#settings input, #settings button, #settings select { padding: 5px; font-size: 14px; }

#messages {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 10px;
  list-style: none;
  padding-bottom: 260px;
}
#messages li { margin-bottom: 5px; }
.private { background: #fff3cd; padding: 3px 6px; border-radius: 4px; }

.time { opacity: .6; margin-right: 4px; }

</style>
</head>
<body>

<div id="login">
  <h2>入室</h2>

  <div id="roomInfo"
       style="margin-bottom:10px; color:#555;">
  </div>

  <!-- ===== ルール説明 ===== -->
<div style="
  margin-top:14px;
  padding:10px;
  font-size:13px;
  line-height:1.6;
  background:#f5f5f5;
  border:1px solid #ccc;
">

<strong>利用ルール</strong><br><br>

<div id="roomDesc"
     style="
       margin-bottom:12px;
       white-space:pre-wrap;
       font-size:13px;
       line-height:1.6;
     ">
</div>

</div>


  <input id="nameInput"
         placeholder="名前">

  <!-- ===== 確認チェック ===== -->
  <div style="
    margin-top:12px;
    font-size:14px;
    line-height:1.6;
  ">

    <label>
      <input type="checkbox"
             id="confirmAge">
      18歳未満の利用は禁止です
    </label>
    <br>

    <label>
      <input type="checkbox"
             id="confirmRule">
      ルール・禁止事項を確認しました
    </label>
    <br>

    <label>
      <input type="checkbox"
             id="confirmIp">
      IPアドレスは保管され、
      問題発生時は開示される可能性があります
    </label>


  </div>

  <button id="joinBtn"
          style="margin-top:12px;">
    入室
  </button>
</div>

<div id="chat">
 <div id="controls">
  <input id="input" placeholder="メッセージ">
  <button id="sendBtn">送信</button>

  <span id="roomLabel"
    style="padding:10px; font-weight:bold;">
  </span>
</div>
<!-- ===== 下固定まとめ ===== -->
<div id="bottomBar" style="
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background:#fff;
  z-index:200;
  display:flex;
  flex-direction:column;
  gap:5px;
  padding:5px;
">

<!-- ===== すごろくダイス ===== -->
<div id="sugorokuDice" style="
  padding:8px;
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:flex-start;
">
  <button onclick="rollDice(6)">1d6</button>
  <button onclick="rollDice(5)">1d5</button>
  <button onclick="rollDice(4)">1d4</button>
  <button onclick="rollDice(3)">1d3</button>
  <button onclick="rollDice(2)">1d2</button>

  <button id="luckBtn" onclick="tryLuck()" style="display:none;">
    運試し
  </button>

  <button id="specialDiceBtn" style="display:none;">
    2d6
  </button>
</div>

<!-- ===== タイマー ===== -->
<div id="timerBox" style="
  padding:8px;
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:flex-start;
  border-top:1px solid #ccc;
">

  <button id="timer3Btn">3分</button>
  <button id="timer5Btn">5分</button>

  <input id="timerCustomInput"
    placeholder="分"
    style="width:60px;">

  <button id="timerCustomBtn">任意</button>

</div>

<div id="punishWrap" style="
  display:flex;
  gap:20px;
  justify-content:flex-start;
">
  <button onclick="sendPunish('girl')">女子罰</button>
  <button onclick="sendPunish('boy')">男子罰</button>

  <button id="zecchoBtn" style="display:none; background:black; color:white; padding:8px 12px; border-radius:6px;">
    絶頂許可
  </button>
</div>

</div>

<ul id="messages"></ul>


<!-- ===== 参加者 ===== -->
<div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
  <strong>参加者:</strong>
  <ul id="userList"></ul>
</div>



<div id="timerDisplay"
     style="
       font-weight:bold;
       padding:4px 0;
       display:none;">
  ⏱ 00:00
</div>



    <label>色: <input type="color" id="colorSelect" value="#000000"></label>
    <label>内緒:
      <select id="privateTarget">
        <option value="">なし</option>
      </select>
    </label>
    <label>
      音:
      <select id="soundSelect">
        <option value="off">OFF</option>
        <option value="small">小</option>
        <option value="medium">中</option>
        <option value="large">大</option>
      </select>
    </label>
    <button id="ruleBtn">説明</button>
    <button id="leaveBtn">退出</button>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const login = document.getElementById("login");
const chat = document.getElementById("chat");
const joinBtn = document.getElementById("joinBtn");
const nameInput = document.getElementById("nameInput");
const roomInfo = document.getElementById("roomInfo");

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const leaveBtn = document.getElementById("leaveBtn");
const userList = document.getElementById("userList");
const colorSelect = document.getElementById("colorSelect");
const privateTarget = document.getElementById("privateTarget");
const soundSelect = document.getElementById("soundSelect");

const notifySound = new Audio("/notify.mp3");
const SOUND_LEVELS = { off:0, small:0.2, medium:0.5, large:1.0 };
let soundLevel = localStorage.getItem("soundLevel") || "off";
soundSelect.value = soundLevel;

let username = "";
let myColor = "#000000";
let privateTo = "";
let joined = false;






window.addEventListener("load", () => {
  const savedName  = localStorage.getItem("chatName");
  const savedRoom  = localStorage.getItem("chatRoom");
  const savedColor = localStorage.getItem("chatColor") || "#000000";

  if (savedName && savedRoom) {
    username = savedName;
    myColor = savedColor;
    colorSelect.value = myColor;
    

  socket.emit("join", {
  name: username,
  color: myColor,
  room: savedRoom,
  connectKey: localStorage.getItem("connectKey")
});

    joined = true;
    

        // ===== 初回確認済みならチェック非表示 =====
    const confirmed =
      localStorage.getItem(
        "entryConfirmed"
      );

    if (confirmed){
      const loginDiv =
        document.getElementById("login");

      if (loginDiv){
        loginDiv.style.display =
          "none";
      }
    }

    login.style.display = "none";
    chat.style.display = "flex";
  }
});

/* ===== ロビーからの情報 ===== */
const room = localStorage.getItem("chatRoom");

const descEl =
  document.getElementById("roomDesc");


if (
  room === "sugoroku1" ||
  room === "sugoroku2" ||
  room === "sugoroku3"
) {
descEl.innerHTML =
`プレイヤーは
「名前＋性別＋M」で入室すること

【重要】
見学者はプレイヤーに対して
・オナニー方法
・寸止め方法
・体勢
などの指示を出すことができる

【遊び方】
コースを選ぶ

A. 気軽コース
→ Mは1d6のサイコロを振れる

B. 普通コース
→ Mは1d5のサイコロを振れる

C. 絶望コース
→ Mは1d4のサイコロを振れる

Z. 裏道コース
→ Mは1d3のサイコロを振れる


さらに以下が常時適用される：

✧ 空いている時間は乳首をいじめ続ける
✧ 寸止めは「止めようと思ってから10回」手を止めずに続ける

ゴールできなかった場合
→ 後日やり直すこと

全員に対して
・自分以外は「様付け＋敬語」で話す
・指示されたら感謝すること

実行中は
・実況して周りを楽しませること

絶頂する場合
→「イカせてください」と懇願し許可を得る
→ 誰もいない場合は30秒我慢後「イキます」と言って絶頂

絶頂してしまった場合
→ 下の罰を1回引き行う。
→ その命令は終了

<br><br>
何かあった際は↓<br>
<a href="https://chat.luvul.net/ChatRoom?room_id=428529" target="_blank">
https://chat.luvul.net/ChatRoom?room_id=428529
</a>
`;
}  



/* ===== 全部屋共通：文字色 ===== */
descEl.style.color = "black";



const roomLabel = document.getElementById("roomLabel");

if (roomLabel && room) {
  roomLabel.textContent = room;
}


const key = localStorage.getItem("chatKey");


if (!room && !joined) {
  alert("ロビーから入室してください");

}
if (room) roomInfo.textContent = `入室先：${room}`;

/* ===== 表示 ===== */
function renderMsg(d) {
  const li = document.createElement("li");

  if (d.time) {
    const t = document.createElement("span");
    t.textContent = `[${d.time}] `;
    t.className = "time";
    li.appendChild(t);
  }

  const text = document.createElement("span");
  if (d.private) {
    const toName = d.toName || "相手";
    text.textContent = `【内緒】${d.name} ▶ ${toName}: ${d.text}`;
    li.classList.add("private");
  } else {
    text.textContent = `${d.name}: ${d.text}`;
  }

 li.appendChild(text);
li.style.color = d.color || "#000";

if (d.bold) {
  text.style.fontWeight = "bold";
}

messages.prepend(li);

}

/* ===== 受信 ===== */
socket.on("connect", () => {

  myId = socket.id;


});

socket.on("pastMessages", logs => {

  messages.innerHTML = "";
  logs.forEach(renderMsg);


});

// ===== 個人ミュート管理 =====
let myMutes = [];

// server から同期（後で拡張用）
socket.on("muteSync", list => {
  myMutes = list || [];
});

socket.on("message", d => {

// ===== ミュート遮断 =====
if (d.name && myMutes.includes(d.name)) {
  return;
}


  // ===== 内緒表示制御 =====
  if (d.private) {
    if (d.to !== myId && d.name !== username) return;
  }

  // ===== 通知音 =====
  if (
    soundLevel !== "off" &&
    d.name &&
    d.name !== username
  ) {
    notifySound.volume =
      SOUND_LEVELS[soundLevel];

    notifySound.currentTime = 0;
    notifySound.play().catch(()=>{});
  }

  renderMsg(d);

});

socket.on("zecchoUnlock", () => {

  const btn = document.getElementById("zecchoBtn");

  if (btn){
    btn.style.display = "inline-block";
  }

});
// ===== タイマー同期 =====
let timerInterval = null;

socket.on("timerSync", ({ endTime }) => {

  const display =
    document.getElementById("timerDisplay");

  if (!display) return;

  display.style.display = "block";

  if (timerInterval){
    clearInterval(timerInterval);
  }

  timerInterval = setInterval(() => {

    const remain =
      Math.max(0, endTime - Date.now());

    const sec =
      Math.floor(remain / 1000);

    const m =
      String(Math.floor(sec / 60))
        .padStart(2,"0");

    const s =
      String(sec % 60)
        .padStart(2,"0");

    display.textContent =
      `⏱ ${m}:${s}`;

    if (remain <= 0){
      clearInterval(timerInterval);
    }

  }, 1000);

});

// ===== タイマー終了 =====
socket.on("timerEnd", () => {

  const display =
    document.getElementById("timerDisplay");

  if (display){
    display.style.display = "none";
  }

  if (timerInterval){
    clearInterval(timerInterval);
  }

});

socket.on("zecchoHide", () => {

  const btn =
    document.getElementById("zecchoBtn");

  if (btn){
    btn.style.display = "none";
  }

});




socket.on("userList", list => {

  userList.innerHTML = "";
  privateTarget.innerHTML =
    `<option value="">なし</option>`;

  list.forEach(u => {

    const li = document.createElement("li");

const nameSpan = document.createElement("span");

nameSpan.textContent =
  (u.isAdmin ? "👑" : "") + u.name;

nameSpan.style.color =
  u.color || "#000";

li.appendChild(nameSpan);

    // ===== 自分以外のみ操作ボタン =====
    if (u.id !== myId) {

      // 内緒用
      const opt =
        document.createElement("option");

      opt.value = u.id;
      opt.textContent = u.name;

      privateTarget.appendChild(opt);

    
   // ===== ミュートボタン =====
const muteBtn =
  document.createElement("button");

// 初期表示
if (myMutes.includes(u.name)) {
  muteBtn.textContent = "済";
} else {
  muteBtn.textContent = "消";
}

muteBtn.style.marginLeft = "6px";
muteBtn.style.padding = "2px 6px";
muteBtn.style.fontSize = "12px";
muteBtn.style.lineHeight = "1.2";

muteBtn.onclick = () => {

  socket.emit("muteUser", u.id);

  // 表示トグル
  if (muteBtn.textContent === "消") {
    muteBtn.textContent = "済";
  } else {
    muteBtn.textContent = "消";
  }

};


      li.appendChild(muteBtn);
    }

    userList.appendChild(li);

  });

});


// ===== 接続キー生成 =====
let connectKey =
  localStorage.getItem("connectKey");

if (!connectKey){

  connectKey =
    Math.random().toString(36).slice(2) +
    Date.now().toString(36);

  localStorage.setItem(
    "connectKey",
    connectKey
  );

}

/* ===== 入室処理 ===== */
joinBtn.onclick = () => {

const room = localStorage.getItem("chatRoom");

if (!room) {
  alert("ロビーから入室してください");
  return;
}

  if (joined || !nameInput.value.trim()) return;

    // ===== 確認チェック判定 =====
  const ageCheck =
    document.getElementById("confirmAge");

  const ruleCheck =
    document.getElementById("confirmRule");

  const ipCheck =
    document.getElementById("confirmIp");

  const confirmed =
    localStorage.getItem(
      "entryConfirmed"
    );

  // 初回のみ必須
  if (!confirmed) {

    if (
      !ageCheck?.checked ||
      !ruleCheck?.checked ||
      !ipCheck?.checked
    ){
      alert(
        "確認項目をすべてチェックしてください"
      );
      return;
    }

    localStorage.setItem(
      "entryConfirmed",
      "true"
    );
  }


  username = nameInput.value.trim();
  localStorage.setItem("chatName", username);

  socket.emit("join", {
  name: username,
  color: myColor,
  room,
  key,
  connectKey
});


  joined = true;
  login.style.display = "none";
  chat.style.display = "flex";
};

/* ===== 操作 ===== */
colorSelect.oninput = () => {
  myColor = colorSelect.value;
  localStorage.setItem("chatColor", myColor);
  socket.emit("updateColor", { color: myColor });
};

soundSelect.onchange = () => {
  soundLevel = soundSelect.value;
  localStorage.setItem("soundLevel", soundLevel);
};

privateTarget.onchange = () => {
  privateTo = privateTarget.value || "";
};

sendBtn.onclick = () => {
  if (!input.value.trim()) return;
  socket.emit("message", {
    text: input.value.trim(),
    color: myColor,
    to: privateTo || undefined
  });
  input.value = "";
  privateTo = "";
  privateTarget.value = "";
};

document.getElementById("zecchoBtn").onclick = () => {
  socket.emit("message", { text: "絶頂許可" });
};

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

leaveBtn.onclick = () => {
  socket.emit("leave");
  localStorage.removeItem("chatName");
  localStorage.removeItem("chatRoom");
  localStorage.removeItem("chatKey");
  location.href = "/lobby.html";
};

// ===== すごろく通常ダイス送信 =====
function rollDice(sides){
  socket.emit("sugorokuRoll", { sides });
}

document.getElementById("ruleBtn").onclick = () => {
  const w = window.open("", "_blank");

  w.document.write("<pre>" +
    document.getElementById("roomDesc").innerText +
    "</pre>");
};

function tryLuck(){

  const n = Math.floor(Math.random()*5)+1;

  socket.emit("message", {
    text: `🎲 運試し → ${n}`
  });

  const btn =
    document.getElementById("luckBtn");

  if (btn){
    btn.style.display = "none";
  }


}
socket.on("sugorokuEvent", ({ type }) => {

  const btn =
    document.getElementById("specialDiceBtn");

  if (type === "luck") {

    if (!btn) return;

  btn.style.display = "inline-block";
  btn.textContent = "1d10";

  btn.onclick = () => {

    const n = Math.floor(Math.random()*10)+1;

    socket.emit("message", {
      text: `🎲 1d10 → ${n}`
    });

  };
  return;
}



  btn.style.display = "inline-block";

  if (type === "14" || type === "24" || type === "40") {
    btn.textContent = "2d6";
  }
  else if (type === "2d4") {
    btn.textContent = "2d4";
  }




  btn.style.backgroundColor = "red";
  btn.style.color = "white";
  btn.style.padding = "8px 12px";
  btn.style.borderRadius = "6px";

  btn.onclick = () => {

    let d1 = 0;
    let d2 = 0;
    let total = 0;

    // ===== 14 / 24 =====
    if (type === "14" || type === "24") {

      d1 = Math.floor(Math.random()*6)+1;
      d2 = Math.floor(Math.random()*6)+1;
      total = d1 + d2;

      socket.emit("message", {
        text: `🎲 2d6 → ${d1},${d2} = ${total}`
      });

      if (d1 === d2) {


        if (type === "14") {
          socket.emit("sugorokuMoveTo", { pos: 1 });
        }

        if (type === "24") {
          socket.emit("sugorokuMoveTo", { pos: 16 });
        }

      }

 

    }


    // ===== 40（ゴール用）=====
    if (type === "40") {

      d1 = Math.floor(Math.random()*6)+1;
      d2 = Math.floor(Math.random()*6)+1;
      total = d1 + d2;

      socket.emit("message", {
        text: `🎲 2d6 → ${d1},${d2} = ${total}`
      });

  if (d1 === d2) {

  if (type === "40") {

    socket.emit("message", {
      text: "🏁 ゴール！絶頂解放"
    });

  const btn = document.getElementById("zecchoBtn");
if (btn) btn.style.display = "inline-block";

  }

} else {

  socket.emit("message", {
    text: "⚠ 寸止め1回"
  });

}
    }

    // ===== 2d4 =====
    if (type === "2d4") {

      d1 = Math.floor(Math.random()*4)+1;
      d2 = Math.floor(Math.random()*4)+1;
      total = d1 + d2;

      socket.emit("message", {
        text: `🎲 2d4 → ${d1},${d2} = ${total}`
      });

      socket.emit("sugorokuBack", {
        steps: total
      });

    }

  };

});

function sendPunish(type){

  if (type === "girl"){
    socket.emit("message", {
      text: "命令女",
      bold: true
    });
  }

  if (type === "boy"){
    socket.emit("message", {
      text: "命令男",
      bold: true
    });
  }

}

socket.on("showLuckBtn", () => {

  const btn =
    document.getElementById("luckBtn");

  if (btn){
    btn.style.display = "inline-block";
  }

});

window.addEventListener("load", () => {




  
  // ===== タイマーボタン（通常と電気分離） =====

// 通常
const normalTimer3Btn =
  document.getElementById("timer3Btn");

const normalTimer5Btn =
  document.getElementById("timer5Btn");

if (normalTimer3Btn){
  normalTimer3Btn.onclick = () => {
    socket.emit("timerStart", { seconds: 180 });
  };
}

if (normalTimer5Btn){
  normalTimer5Btn.onclick = () => {
    socket.emit("timerStart", { seconds: 300 });
  };
}



// ===== 任意タイマー（通常） =====
const normalTimerCustomBtn =
  document.getElementById("timerCustomBtn");

const normalTimerCustomInput =
  document.getElementById("timerCustomInput");

if (normalTimerCustomBtn){

  normalTimerCustomBtn.onclick = () => {

    const min =
      parseInt(normalTimerCustomInput.value);

    if (!min || min <= 0) return;

    socket.emit("timerStart", {
      seconds: min * 60
    });

    normalTimerCustomInput.value = "";

  };

}






});



</script>

</body>
</html>
